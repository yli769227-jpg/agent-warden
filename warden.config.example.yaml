# warden.config.example.yaml
# ---------------------------------------------------------------------------
# Full reference configuration for agent-warden.
# Every supported field is present with an explanatory inline comment.
#
# Resolution order (warden looks for a config file in this order):
#   1. Path passed explicitly to `warden run <path>`
#   2. WARDEN_CONFIG environment variable
#   3. ./warden.config.yaml  (current working directory)
#   4. ~/.warden/config.yaml (home fallback)
# ---------------------------------------------------------------------------


# ---------------------------------------------------------------------------
# mode  (required-ish — defaults to "audit" when omitted)
#
# "audit"   — Every intercepted tools/call is logged and then forwarded
#             downstream unconditionally.  Policy rules and built-in dangerous
#             patterns are evaluated and recorded in the audit log, but they
#             never block a call.  Use this in development so you can see what
#             an agent does before writing enforcement rules.
#
# "enforce" — Policy rules are authoritative.  A "deny" verdict stops the call
#             right here; the downstream server never sees it.  Built-in
#             dangerous-keyword matches also block in this mode.  Use this in
#             production.
# ---------------------------------------------------------------------------
mode: enforce          # switch to "audit" while iterating on policy rules


# ---------------------------------------------------------------------------
# logFile  (optional — defaults to ~/.warden/audit.jsonl)
#
# Absolute or relative path to the JSONL audit log.  Each line is a single
# JSON object (AuditEntry) containing: ts, tool, args (scrubbed), verdict,
# reason, durationMs, error.
#
# Leading "~/" is expanded to the current user's home directory at load time.
# The parent directory is created automatically when warden first writes a
# log entry.
#
# Rotate or compress old logs externally (e.g. logrotate); warden appends
# indefinitely.
# ---------------------------------------------------------------------------
logFile: ~/.warden/audit.jsonl   # absolute path is also fine: /var/log/warden/audit.jsonl


# ---------------------------------------------------------------------------
# servers  (REQUIRED — either this or the legacy downstreamCommand must be set)
#
# Named downstream MCP servers that warden proxies.  Each key becomes a
# namespace prefix on tool names: server key "filesystem" → tools are
# exposed as "filesystem/read_file", "filesystem/write_file", etc.
#
# Add as many servers as you need.  Warden connects to all of them at
# startup and merges their tool namespaces.
#
# Each server entry has:
#   command  — Executable to spawn (required).
#   args     — List of arguments (optional, default []).
#   env      — Extra environment variables merged into the child's env (optional).
#              Use ${VAR} syntax; values are resolved from the parent environment.
#
# Tips:
#   • Use `npx -y` so packages auto-install if not already cached.
#   • Absolute paths in args avoid cwd-relative ambiguity.
#   • For locally built servers use command: node, args: ["dist/index.js"].
# ---------------------------------------------------------------------------
servers:

  # ── Official @modelcontextprotocol/server-filesystem ─────────────────────
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /Users/alice/projects/my-app    # root directory the server may access

  # ── GitHub MCP server (official) ─────────────────────────────────────────
  # github:
  #   command: npx
  #   args:
  #     - -y
  #     - "@modelcontextprotocol/server-github"
  #   env:
  #     GITHUB_TOKEN: "${GITHUB_TOKEN}"   # resolved from parent environment

  # ── Custom local server ───────────────────────────────────────────────────
  # myserver:
  #   command: node
  #   args:
  #     - /Users/alice/my-mcp-server/dist/index.js


# ---------------------------------------------------------------------------
# policy
#
# Controls which tools/call invocations are forwarded to the downstream server
# and which are blocked.
#
# Evaluation order:
#   1. Explicit rules (first match wins; supports "*" glob)
#   2. Built-in dangerous patterns (keyword match on tool name, or filesystem
#      write targeting a path outside the process cwd)
#   3. defaultAction fall-through
#
# With multiple servers, use the server prefix in tool names:
#   "filesystem/write_file"   — matches only the filesystem server's write_file
#   "filesystem/*"            — matches all filesystem tools
#   "*delete*"                — matches any tool on any server with "delete" in name
# ---------------------------------------------------------------------------
policy:

  # defaultAction  ("allow" | "deny")
  #
  # "allow"  — permissive default; deny only a known set of tools (denylist).
  # "deny"   — strict default; every tool must be explicitly allowed (allowlist).
  defaultAction: allow

  # rules  (ordered list; first match wins)
  #
  #   tool    — Exact name or glob ("*" matches any characters, case-sensitive).
  #             Include the server prefix for server-specific rules.
  #   action  — "allow" | "deny"
  #   reason  — Optional note recorded in every matching audit entry.
  rules:

    # ── Read-only filesystem access: always allow ─────────────────────────────
    - tool: "filesystem/read_file"
      action: allow
      reason: "Read access is always permitted"

    - tool: "filesystem/list_directory"
      action: allow

    - tool: "filesystem/search_files"
      action: allow

    # ── Destructive filesystem ops: deny ──────────────────────────────────────
    - tool: "filesystem/write_file"
      action: deny
      reason: "Filesystem writes require explicit human approval"

    - tool: "filesystem/delete_file"
      action: deny
      reason: "Deletion is irreversible"

    - tool: "filesystem/move_file"
      action: deny
      reason: "Move can cause irreversible data loss"

    # ── GitHub: allow read, deny mutations ────────────────────────────────────
    - tool: "github/get_*"
      action: allow

    - tool: "github/list_*"
      action: allow

    - tool: "github/search_*"
      action: allow

    - tool: "github/create_*"
      action: deny
      reason: "GitHub writes require explicit review"

    - tool: "github/push_*"
      action: deny
      reason: "Push operations require explicit review"

    # ── Catch-all: any tool containing "delete" or "destroy" ─────────────────
    - tool: "*delete*"
      action: deny
      reason: "Deletion requires explicit policy exception"

    - tool: "*destroy*"
      action: deny


# ---------------------------------------------------------------------------
# scrubber
#
# Redacts secrets from tool arguments before they are written to the audit
# log.  The scrubber runs on every intercepted call regardless of verdict.
#
# Built-in patterns (always active when enabled: true):
#   • AWS access-key IDs  (AKIA…)
#   • Generic key/secret/token/password assignments in quoted strings
#   • PEM private keys
#   • GitHub personal-access / fine-grained / OAuth tokens  (ghp_, gho_, …)
#   • HTTP Authorization: Bearer …
#   • .env-style KEY=<long-mixed-char-value> lines
#
# Matched text is replaced with the literal token [REDACTED] in the log.
# The original value is never written to disk.
# ---------------------------------------------------------------------------
scrubber:

  # enabled  (true | false)
  #
  # Set to false only in controlled environments where you need to inspect raw
  # argument payloads for debugging.  Never disable in production.
  enabled: true

  # patterns  (optional list of additional regex source strings)
  #
  # Each string is compiled with the "g" flag and applied on top of the
  # built-in set.  Use JavaScript regex syntax.  Double-escape backslashes
  # because the value is a YAML string first, then a regex source string.
  #
  # Examples below show three common additions:
  #   1. Internal service tokens that follow a project-specific prefix
  #   2. Database connection strings containing credentials
  #   3. Numeric card / account numbers (PCI scope)
  patterns:
    # Internal API tokens issued by your own auth service (e.g. "svc_abc123…")
    - "svc_[A-Za-z0-9]{32,}"

    # PostgreSQL / MySQL connection strings with embedded credentials
    - "(?:postgres|mysql)://[^:]+:[^@]+@[^/\\s]+"

    # 16-digit sequences that could be payment card numbers (Luhn-range format)
    - "\\b[0-9]{4}[\\s\\-]?[0-9]{4}[\\s\\-]?[0-9]{4}[\\s\\-]?[0-9]{4}\\b"


# ---------------------------------------------------------------------------
# rateLimit  (optional)
#
# Per-tool call rate limiting.  Applies before policy rules; a rate-limited
# call is denied and logged without ever reaching the policy engine or the
# downstream server.
#
# Evaluation order:
#   1. Kill switch (immediate block)
#   2. Rate limit (blocks if quota exceeded)
#   3. Policy rules
#   4. Forward to downstream
#
# Each rule has:
#   tool:      Exact tool name or glob pattern (same syntax as policy rules).
#   capacity:  Maximum calls allowed in the window.
#   windowMs:  Rolling window length in milliseconds.
#              1 minute  = 60000
#              5 minutes = 300000
#              1 hour    = 3600000
#
# Per-tool semantics: each matching tool name has its own independent bucket.
# A rule "github/*" with capacity 5 means each individual github tool may be
# called up to 5 times per window — calls to different tools do not share the
# same counter.
#
# Omit this section entirely to disable rate limiting.
# ---------------------------------------------------------------------------
rateLimit:

  enabled: true

  rules:

    # ── Destructive ops: maximum 3 calls per 5 minutes per tool ──────────────
    - tool: "*delete*"
      capacity: 3
      windowMs: 300000

    - tool: "*destroy*"
      capacity: 1
      windowMs: 3600000     # 1 per hour

    - tool: "filesystem/write_file"
      capacity: 10
      windowMs: 60000       # 10 writes per minute

    # ── GitHub API: respect the 5000 req/h rate limit ────────────────────────
    - tool: "github/*"
      capacity: 30
      windowMs: 60000       # 30 calls/minute per tool (conservative)

    # ── Global fallback: any tool not matched above ───────────────────────────
    - tool: "*"
      capacity: 60
      windowMs: 60000       # 60 calls/minute per tool (generous default)
