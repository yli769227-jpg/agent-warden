name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration
        timeout-minutes: 3

      - name: Smoke test CLI
        run: |
          node dist/cli.js --help
          node dist/cli.js version
          # init should create a starter config
          cd /tmp && node $GITHUB_WORKSPACE/dist/cli.js init
          test -f /tmp/warden.config.yaml
          # validate the generated config
          node $GITHUB_WORKSPACE/dist/cli.js validate /tmp/warden.config.yaml
          # Smoke test log-analysis commands with empty log
          LOG=/tmp/warden-smoke-test.jsonl
          # Write a handful of test entries
          echo '{"ts":"2026-01-01T10:00:00.000Z","tool":"fs/read","verdict":"allow","durationMs":5}' > $LOG
          echo '{"ts":"2026-01-01T10:01:00.000Z","tool":"fs/write","verdict":"deny","durationMs":3}' >> $LOG
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js stats --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js profile --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js anomaly-score --window 48 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js summary --window 48 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js snapshot --output /tmp/snap.json --window 48
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js ci-check --window 48 --max-deny-rate 100 --allow-dangerous || true
          # New commands smoke tests
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js heat-map --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js trending --window 48 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js blame --window 48 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js scope --window 48 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js session-summary --since 2026-01-01 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js alert-history --since 2026-01-01 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js token-estimate --since 2026-01-01 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js latency-percentiles --since 2026-01-01 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js policy-stats --since 2026-01-01 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js redact-scan --since 2026-01-01 --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js verify-integrity --json
          WARDEN_LOG=$LOG node $GITHUB_WORKSPACE/dist/cli.js export-html --output /tmp/report.html --title "CI Test"
          test -f /tmp/report.html

      - name: Upload test results
        if: always() && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          if-no-files-found: ignore
